- name: demo on conditions/filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform, devops
  tasks:
   - name: greetings
     ansible.builtin.debug:
      msg: "Hello {{ name | default('Guest') }}"  #using default filter to provide a default value if the variable is not defined


   - name: print topics as list
     ansible.builtin.debug:
       msg: "Topics: {{ topics | split(', ') }}"