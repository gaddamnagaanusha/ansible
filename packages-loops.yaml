- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: installing packages using loop
    ansible.builtin.package:
      name: "{{ name.item }}"
      state: "{{ state.item}}"
    loop:
    - { name: mysql, state: present }
    - { name: nginx, state: present }
    - { name: zip, state: present }