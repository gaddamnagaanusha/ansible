- name: demo on data types
  hosts: local
  connection: local
  vars:
    string_var: "ansible for beginners"   #string data type
    int_var: 10                           #integer data type
    float_var: 3.14                       #float data type
    bool_var: true                        #boolean data type
    list_var: ["ansible", "devops", "aws"]   #list data type
    dict_var:                               #dictionary data type
      course: "ansible"
      duration: "2 hours"
      trainer: "Anusha"
  tasks:
  - name: print variables of different data types
    ansible.builtin.debug:
      msg: "string_var: {{ string_var }}, int_var: {{ int_var }}, float_var: {{ float_var }}, bool_var: {{ bool_var }}, list_var: {{ list_var }}, dict_var: {{ dict_var }}"  